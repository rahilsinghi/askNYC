steps:
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/backend:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/backend:latest'
      - '.'
    dir: 'backend'

  # Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '--build-arg'
      - 'NEXT_PUBLIC_WS_URL=wss://asknyc-backend-901435891859.us-central1.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_MAPBOX_TOKEN=${_MAPBOX_TOKEN}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/frontend:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/frontend:latest'
      - '.'
    dir: 'frontend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/backend']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/frontend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'asknyc-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'asknyc-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/frontend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/backend:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/backend:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/frontend:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/asknyc/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _MAPBOX_TOKEN: ''

timeout: '1200s'
